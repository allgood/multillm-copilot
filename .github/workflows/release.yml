name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 0.2.3). If omitted, only builds without version sync.'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run postinstall script (copy tokenizer)
        run: node scripts/copy-tokenizer.js

      # Determine version source: manual input > tag > none
      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "ver=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
            echo "ver=${VER}" >> $GITHUB_OUTPUT
          else
            echo "ver=" >> $GITHUB_OUTPUT
          fi

      # Only sync and push when a version is resolved
      - name: Sync and commit version
        if: steps.ver.outputs.ver != ''
        run: |
          VER="${{ steps.ver.outputs.ver }}"
          echo "Syncing package.json version to ${VER}"
          npm version "$VER" --no-git-tag-version --allow-same-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${VER} [skip ci]"
          BRANCH=$(git branch -r --contains "$GITHUB_SHA" | head -1 | sed 's|.*origin/||' | xargs)
          if [ -n "$BRANCH" ]; then
            git push origin "HEAD:refs/heads/$BRANCH"
          else
            echo "No remote branch found, skipping push."
          fi

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package -o extension.vsix

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      # Generate changelog from git log since previous tag
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Find the previous tag (the one before the current tag)
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline --reverse "${PREV_TAG}..${TAG}" 2>/dev/null || true)
            if [ -z "$LOG" ]; then
              LOG="No commits between ${PREV_TAG} and ${TAG}."
            fi
          else
            LOG="First release."
          fi
          # Write changelog to file to avoid escaping issues with multiline output
          echo "$LOG" > /tmp/changelog.txt
          # Also set as step output (single line for fallback)
          {
            echo "text<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # On tag push, create a draft Release with generated changelog
      - name: Create draft Release (tag push)
        if: github.event_name != 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body_path: /tmp/changelog.txt
          draft: true
          prerelease: false
          files: extension.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On published Release, only upload the .vsix without modifying the user-written description
      - name: Upload .vsix to published Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: extension.vsix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload .vsix as a workflow artifact (backup)
      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-go-copilot-${{ steps.version.outputs.version }}.vsix
          path: extension.vsix
          if-no-files-found: error

      # 发布到 VS Code Marketplace
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT" --packagePath extension.vsix --allow-all-proposed-apis
