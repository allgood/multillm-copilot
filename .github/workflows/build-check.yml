name: Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run postinstall script (copy tokenizer)
        run: node scripts/copy-tokenizer.js

      - name: Compile TypeScript
        run: npm run compile

      - name: Lint
        run: npm run lint
